    /* ── Render ─────────────────────────────────────────────────────────── */
    let currentLang = localStorage.getItem('dharma_lang') || 'en';

    function t(key) {
        return (UI[currentLang] || UI.en)[key] || UI.en[key];
    }

    // For Indian guides: fall back to English content when regional translation missing.
    // For Ukrainian guides: only show on uk/en.
    function getGuideContent(guide, lang) {
        if (guide[lang]) return guide[lang];
        // Fallback chain: lang -> en
        return guide.en || null;
    }

    function shouldShowGuide(guide, lang) {
        if (lang === 'uk') return guide.audience === 'ukraine';
        return guide.audience === 'india';
    }

    function renderLangButtons() {
        const row = document.getElementById('lang-row');
        row.innerHTML = '';
        Object.keys(LANG_NAMES).forEach(code => {
            const b = document.createElement('button');
            b.className = 'lang-btn' + (code === currentLang ? ' active' : '');
            b.textContent = LANG_NAMES[code];
            b.onclick = () => {
                currentLang = code;
                localStorage.setItem('dharma_lang', code);
                renderAll();
            };
            row.appendChild(b);
        });
    }

    function renderUI() {
        document.documentElement.lang = currentLang;
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            el.textContent = t(key);
        });
        document.getElementById('search').placeholder = t('searchPlaceholder');
    }

    function renderGuides(query = '') {
        const list = document.getElementById('guides-list');
        const empty = document.getElementById('empty');
        list.innerHTML = '';
        const q = query.trim().toLowerCase();

        const visible = GUIDES.filter(g => shouldShowGuide(g, currentLang));
        let count = 0;

        visible.forEach(g => {
            const c = getGuideContent(g, currentLang);
            if (!c) return;
            const haystack = (c.title + ' ' + (c.subtitle||'') + ' ' + JSON.stringify(c.steps)).toLowerCase();
            if (q && !haystack.includes(q)) return;
            count++;

            const det = document.createElement('details');
            det.className = 'scenario';

            const sum = document.createElement('summary');
            sum.innerHTML = `
                <span class="icon">${c.icon}</span>
                <span class="title-block">
                    <span>${c.title}</span>
                    <div class="subtitle">${c.subtitle || ''}</div>
                </span>
            `;
            det.appendChild(sum);

            const body = document.createElement('div');
            body.className = 'body';

            c.steps.forEach((s, i) => {
                const stepDiv = document.createElement('div');
                stepDiv.className = 'step';
                let html = `<span class="step-num">${i+1}</span><span class="step-title">${s.title}</span>`;
                if (s.points && s.points.length) {
                    html += '<ul>' + s.points.map(p => `<li>${p}</li>`).join('') + '</ul>';
                }
                if (s.warn) {
                    html += `<div class="warn"><strong>${t('warnLabel')}:</strong> ${s.warn}</div>`;
                }
                if (s.call && s.call.length) {
                    const links = s.call.map(c => `<a href="tel:${c.num}">${c.label} ${c.num}</a>`).join('');
                    html += `<div class="call"><strong>${t('callLabel')}</strong> ${links}</div>`;
                }
                stepDiv.innerHTML = html;
                body.appendChild(stepDiv);
            });

            det.appendChild(body);
            list.appendChild(det);
        });

        empty.style.display = count === 0 ? 'block' : 'none';
    }

    function renderAll() {
        renderLangButtons();
        renderUI();
        renderGuides(document.getElementById('search').value);
    }

    document.getElementById('search').addEventListener('input', e => {
        renderGuides(e.target.value);
    });

    renderAll();

    // Register service worker so this page is cached for offline use
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(()=>{});
    }
    </script>
